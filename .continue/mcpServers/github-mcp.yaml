name: GitHub MCP
version: 0.0.1
schema: v1

mcpServers:
  - name: GitHub
    description: GitHub PR/Issue interaction, code search, repository management
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"