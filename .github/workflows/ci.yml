# CI/CD Pipeline — {{PROJEKT}}
# Nutzt den zentralen JF-Hospitality Workflow für Docker Build & Deploy.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-cd:
    uses: jf-hospitality/.github/.github/workflows/docker-deploy.yml@main
    with:
      app-name: {{PROJEKT}}
      deploy-dir: /opt/apps/{{PROJEKT}}
      compose-file: docker-compose.prod.yml
      container-name: {{PROJEKT}}_app
      # run-migrations: true          # Aktivieren wenn DB-Migrations nötig
      # migration-command: "..."       # Anpassen an ORM (Prisma, Alembic, etc.)
      # run-lint: true                 # Lint & Type-Check (default: true)
      # pre-lint-command: ""           # z.B. "npx prisma generate"
    secrets: inherit

